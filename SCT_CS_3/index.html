<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fun Password Strength Checker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>🔒 Password Playground!</h1>
        <p>Type your password and see how strong (or silly) it is!</p>
        <input type="password" id="password" placeholder="Enter your password...">
        <div id="strength-meter">
            <div id="strength-bar"></div>
        </div>
        <div id="strength-feedback"></div>
        <div id="emoji-feedback">🤔</div>
    </div>
    <script src="script.js"></script>
</body>
</html>
